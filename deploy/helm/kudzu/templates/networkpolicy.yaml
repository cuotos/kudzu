{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kudzu.fullname" . }}
  labels:
    {{- include "kudzu.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kudzu.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- toYaml .Values.networkPolicy.ingressFrom | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
{{- end }}
